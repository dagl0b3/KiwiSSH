### Cisco SMB Vendor Configuration
## Instructions for backing up Cisco SMB devices

vendor:
  id: "cisco_smb"
  name: "Cisco SMB"
  description: "Cisco Small Business 300, 500, and ESW2 series switches"

  # http://www.cisco.com/c/en/us/support/switches/small-business-300-series-managed-switches/products-release-notes-list.html

### Session-level behavior
session:
  comment_prefix: "! "
  prompt: '^\r?([\w.@()-]+[#>]\s?)$'
  pagination:
    enabled: true
    patterns:
      - pattern: '^.*Your password has exceeded the maximum lifetime.*$'
        response: "N"

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup:
    - command: "enable"
      then: ["{{ enable_password }}"]
    - command: "terminal datadump"
    - command: "terminal length 0"
    - command: "terminal width 0"

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show version"
      metadata: true
    - command: "show bootvar"
      metadata: true
    - command: "show running-config" 
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "exit"
    - command: "exit"

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  ### Lines to strip from captured config (regex patterns)
  # strip_patterns:
  #   - '(\s+)\d+,\d+:\d+:\d+(\s+)'
  #   - '\d+(K)'
  #   - '^(Uptime is ).*'
  #   - '^(#time: ).*'
  ### Lines that mark config boundaries
  ## If either boundary is missing, keep from/to the file edge.
  # config_start: "^# unifi$"
  # config_end: "^# misc$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    patterns:
    #   - search: '^(enable password) \S+ (.*)'
    #     replacement: '\1 <secret hidden> \2'
      - search: '^(snmp-server community) \S+ (.*)'
        replacement: '\1 <configuration removed> \2'
      - search: '^(username \S+ privilege \d+) \S+ (.*)'
        replacement: '\1 <secret hidden> \2'
      - search: '^(username \S+ password encrypted) \S+(.*)'
        replacement: '\1 <secret hidden> \2'
      - search: '^(enable password level \d+ encrypted) \S+'
        replacement: '\1 <secret hidden>'
      - search: '^(encrypted radius-server key).*(.*)'
        replacement: '\1 <configuration removed> \2'
      - search: '^(encrypted radius-server host .+ key) \S+(.*)'
        replacement: '\1 <secret hidden> \2'
      - search: '^(encrypted tacacs-server key).*(.*)'
        replacement: '\1 <secret hidden> \2'  
      - search: '^(encrypted tacacs-server host .+ key) \S+(.*)'
        replacement: '\1 <secret hidden> \2'
      - search: '^(encrypted sntp authentication-key \d+ md5) .*'
        replacement: '\1 <secret hidden>'
