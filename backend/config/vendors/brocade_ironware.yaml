### Brocade Ironware Vendor Configuration
## Instructions for backing up Brocade Ironware devices

vendor:
  id: "brocade_ironware"
  name: "Brocade Ironware"
  description: "Brocade Ironware devices"

### Session-level output behavior.
session:
  comment_prefix: "! "
  prompt: '^.*(telnet|ssh)@.+[>#]\s?$'

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup:
    - command: "enable"
      then: ["{{ enable_password }}"]
    - command: "skip-page-display"
    - command: "terminal length 0"

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show version"
      metadata: true
    - command: "show chassis"
      metadata: true
    - command: "show flash"
      metadata: true
    - command: "show module"
      metadata: true
    - command: "show running-config"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "logout"
    - command: "exit"
    - command: "exit"
      then: ["n"]
      
### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  strip_patterns:
    - '(^((.*)[Ss]ystem uptime(.*))$)'
    - '(^((.*)[Tt]he system started at(.*))$)'
    - '[Uu]p\s?[Tt]ime is .*'
    - '(^((.*)Current temp(.*))$)'
    - 'Speed = [A-Z-]{2,6} \(\d{2,3}%\)'
    - 'current speed is [A-Z-]{2,6} \(\d{2,3}%\)'
    - 'Fan \d* - STATUS: OK \D*\d*.'
    - '\d* deg C'
    - '(\[*)1(\]*)<->(\[*)2(\]*)(<->(\[*)3(\]*))*'
    - '\d+\.\d deg-C'
    - '(\d+) bytes'
    - '(^((.*)Code Flash Free Space(.*))$)'
    - '^((Invalid input)|(Type \?)).*$'
  # config_start: "^config "
  # config_end: "^end$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    # patterns:
    #   - search: "^(#private-encryption-key=).+"
    #     replacement: "\\1<secret hidden>"
