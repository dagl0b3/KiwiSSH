### Cisco AsyncOS Vendor Configuration
## Instructions for backing up Cisco AsyncOS devices

vendor:
  id: "cisco_asyncos"
  name: "Cisco AsyncOS"
  description: "AsyncOS"

### Session-level behavior
session:
  comment_prefix: "! "
  prompt: '^\r*\(?[\w.\- ]+\)?[#>]\s+$'
  pagination:
    enabled: true
    patterns:
      - pattern: '\[\S+\]>\s'
        response: "3"
      - pattern: '-Press Any Key For More-+.*$'
        response: " "

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "version"
      metadata: true
    - command: "showconfig" 
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "exit"

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  ### Lines to strip from captured config (regex patterns)
  strip_patterns:
    - 'Choose the passphrase option:'
    - '1. Mask passphrases \(Files with masked passphrases cannot be loaded using'
    - 'loadconfig command)'
    - '2. Encrypt passphrases'
    - '3. Plain passphrases'
    - '^3$'
    - '\n\s{25,26}'
    - '([-\\\/,.\w><@]+)(\s{25,27})'
  ### Lines that mark config boundaries
  ## If either boundary is missing, keep from/to the file edge.
  # config_start: "^# unifi$"
  # config_end: "^# misc$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    # patterns:
    #   - search: '^(enable password) \S+ (.*)'
    #     replacement: '\1 <secret hidden> \2'
