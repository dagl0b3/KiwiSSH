### Juniper JunOS Vendor Configuration
## Instructions for backing up Juniper JunOS devices

vendor:
  id: "juniper_junos"
  name: "Juniper JunOS"
  description: "Juniper JunOS devices"

### Session-level behavior
session:
  comment_prefix: "# "
  pagination:
    enabled: true
    patterns:
      - pattern: '^---(more)---\s*$'
        response: " "

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Pre-backup commands (prepare the session) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  pre_backup:
    - command: "set cli screen-length 0"
    - command: "set cli screen-width 0"

  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show version"
      metadata: true
    # - command: "show chassis fabric reachability" # only for mx960
    #   metadata: true
    # - command: "show virtual-chassis" # for ^(ex22|ex3[34]|ex4|ex8|qfx)$
    #   metadata: true
    # - command: "show chassis cluster status" # only for SRX
    #   metadata: true
    - command: "show chassis hardware"
      metadata: true
    - command: "show system license"
      metadata: true
    - command: "show system license keys"
      metadata: true
    - command: "show configuration | display omit"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "exit"

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  ### Lines to strip from captured config (regex patterns)
  # strip_patterns:
  #   - "^\\s*RX packets:.*$"
  #   - "^\\s*TX packets:.*$"
  #   - "^\\s*RX bytes:.*$"
  ### Lines that mark config boundaries
  ## If either boundary is missing, keep from/to the file edge.
  # config_start: "^# unifi$"
  # config_end: "^# misc$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    patterns:
      - search: 'community (\S+) {'
        replacement: 'community <redacted> {'
      - search: '(ssh-(rsa|dsa|ecdsa|ecdsa-sk|ed25519|ed25519-sk) )".*; ## SECRET-DATA'
        replacement: '<secret removed>'
      - search: ' "\$\d\$\S+; ## SECRET-DATA'
        replacement: ' <secret removed>'
      - search: '((?:ftp|pasvftp|sftp|scp|https?):\/\/[^\/@"]+):[^@"]+@'
        replacement: '\1:<secret removed>@'
