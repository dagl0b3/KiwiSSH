### Westermo WeOS Vendor Configuration
## Instructions for backing up Westermo WeOS devices

vendor:
  id: "westermo_weos"
  name: "Westermo WeOS"
  description: "Westermo WeOS devices (tested with Lynx)"

### Session-level output behavior.
session:
  comment_prefix: "# "
  prompt: '^[\w\-.]+:/.*[#>]\s?$'
  pagination:
    enabled: true
    patterns:
      - pattern: '^--More--|Space for next page'
        response: " "

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "show system-information"
      metadata: true
    - command: "show running-configuration"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "exit"

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  # strip_patterns:
    # - "^% Invalid input detected at '\\^' marker\\.$"
    # - "^\\s+\\^$"
    # - "^#config-version="
    # - "^conf_file_ver=.*$"
  # config_start: "^config "
  # config_end: "^end$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    patterns:
      - search: '("password"\s*:\s*)".*?"'
        replacement: '\1"<hidden>"'
      - search: '("secret"\s*:\s*)".*?"'
        replacement: '\1"<hidden>"'
      - search: '("key[^"]*"\s*:\s*)".*?"'
        replacement: '\1"<hidden>"'
      - search: '(".*id"\s*:\s*)".{20,}"'
        replacement: '\1"<hidden>"'
