### Mikrotik RouterOS Vendor Configuration
## Instructions for backing up Mikrotik RouterOS devices

vendor:
  id: "mikrotik_routeros"
  name: "Mikrotik RouterOS"
  description: "Mikrotik RouterOS devices"

### Session-level output behavior.
session:
  comment_prefix: "# "
  prompt: '\[\w+@\S+(\s+\S+)*\]\s?>\s?$'

### Commands to execute for backup
## Supported step types in command phases:
## - command: sends command text
## - command + then: sends command text, then sends interactive input
commands:
  ### Main backup command(s)
  ## Commands whose output becomes the stored configuration
  backup:
    - command: "/system resource print"
      metadata: true
    - command: "/system package update print"
      metadata: true
    - command: "/system history print without-paging"
      metadata: true
    - command: "/export"
      show_command_in_config: true

  ### Post-backup commands (cleanup) (OPTIONAL)
  ## Command outputs aren't saved in stored configuration
  post_backup:
    - command: "quit"

### Configuration processing rules
## Processing reduces diff noise and trims non-config boilerplate
processing:
  strip_patterns:
    - '\x1B\[([0-9]{1,3}(;[0-9]{1,3})*)?[m|K]' # strip ANSI colours
    - '^(#\s+installed-version: [^\n]+\n).*?^(?=# software id)'
    - '# inactive time\r\n'
    - '# received packet from \S+ bad format\r\n'
    - '# poe-out status: short_circuit\r\n'
    - '# Firmware upgraded successfully, please reboot for changes to take effect!\r\n'
    - '# \S+ not ready\r\n'
    - '# .+ please restart the device in order to apply the new setting\r\n'
  # config_start: "^config "
  # config_end: "^end$"
  ### Secret masking. When enabled=false, no redaction is applied.
  redaction:
    enabled: false
    # patterns:
      # - search: "^(#private-encryption-key=).+"
      #   replacement: "\\1<secret hidden>"
