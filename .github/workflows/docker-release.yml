name: Build and Publish Docker Images on Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image names and versions
        id: meta
        run: |
          BASE="ghcr.io/${GITHUB_REPOSITORY,,}"
          FRONTEND_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("frontend/src/main.ts").read_text()
          match = re.search(r"FRONTEND_VERSION\s*=\s*['\"]([^'\"]+)['\"]", text)
          if not match:
            raise SystemExit("Frontend version not found")
          print(match.group(1))
          PY
          )
          BACKEND_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("backend/app/__init__.py").read_text()
          match = re.search(r"__version__\s*=\s*['\"]([^'\"]+)['\"]", text)
          if not match:
            raise SystemExit("Backend version not found")
          print(match.group(1))
          PY
          )
          echo "frontend=${BASE}-frontend" >> $GITHUB_OUTPUT
          echo "backend=${BASE}-backend" >> $GITHUB_OUTPUT
          echo "frontend_version=$FRONTEND_VERSION" >> $GITHUB_OUTPUT
          echo "backend_version=$BACKEND_VERSION" >> $GITHUB_OUTPUT

      # -----------------
      # Build frontend
      # -----------------
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile_frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.frontend }}:v${{ steps.meta.outputs.frontend_version }}
            ${{ steps.meta.outputs.frontend }}:latest

      # -----------------
      # Build backend
      # -----------------
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile_backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.backend }}:v${{ steps.meta.outputs.backend_version }}
            ${{ steps.meta.outputs.backend }}:latest
